<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <h1 class="main-title">My Library</h1>
            <p class="subtitle">Your personal book collection</p>
            <button id="open-modal-btn" class="primary-btn">+ Add New Book</button>
        </header>

        <main id="library-container" class="library-grid">
            <!-- Book cards will be injected here by JS -->
        </main>
    </div>

    <dialog id="book-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add a New Book</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <form id="add-book-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" required placeholder="e.g. 1984">
                </div>
                <div class="form-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" name="author" required placeholder="e.g. George Orwell">
                </div>
                <div class="form-group">
                    <label for="pages">Pages</label>
                    <input type="number" id="pages" name="pages" required min="1" placeholder="e.g. 328">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="isRead" name="isRead">
                    <label for="isRead">I have read this book</label>
                </div>
                <button type="submit" class="submit-btn">Add Book</button>
            </form>
        </div>
    </dialog>

    <dialog id="delete-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Confirm Deletion</h2>
                <button id="close-delete-modal-btn" class="close-btn">&times;</button>
            </div>
            <p style="margin-bottom: 1.5rem; color: var(--text-secondary);">Are you sure you want to delete this book from your library?</p>
            <div class="modal-actions" style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button id="cancel-delete-btn" class="secondary-btn">Cancel</button>
                <button id="confirm-delete-btn" class="delete-btn" style="margin-top: 0;">Delete</button>
            </div>
        </div>
    </dialog>

    <script src="./script.js"></script>
</body>

</html>
