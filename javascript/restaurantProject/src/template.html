<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayam 3D</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;family=Montserrat:ital,wght@0,100..900;1,100..900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb596",
                        "tertiary-fixed": "#ffdbcd",
                        "surface-variant": "#e9e1dc",
                        "primary-fixed-dim": "#ffb2bd",
                        "secondary": "#5e604d",
                        "on-primary-fixed": "#400013",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#76320f",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "primary-container": "#8b1538",
                        "outline": "#8a7174",
                        "on-tertiary": "#ffffff",
                        "secondary-container": "#e1e1c9",
                        "surface-tint": "#ab2f4e",
                        "secondary-fixed-dim": "#c8c8b0",
                        "secondary-fixed": "#e4e4cc",
                        "on-surface": "#1e1b18",
                        "surface-container-high": "#efe6e2",
                        "on-secondary": "#ffffff",
                        "primary": "#670024",
                        "on-tertiary-container": "#fe9d72",
                        "on-surface-variant": "#574144",
                        "surface-container-highest": "#e9e1dc",
                        "inverse-on-surface": "#f8efea",
                        "on-background": "#1e1b18",
                        "on-secondary-fixed-variant": "#474836",
                        "surface-container": "#f5ece7",
                        "surface": "#fff8f5",
                        "on-secondary-fixed": "#1b1d0e",
                        "outline-variant": "#debfc2",
                        "on-secondary-container": "#636451",
                        "on-primary": "#ffffff",
                        "surface-dim": "#e1d8d4",
                        "surface-bright": "#fff8f5",
                        "background": "#fff8f5",
                        "tertiary-container": "#773310",
                        "inverse-primary": "#ffb2bd",
                        "tertiary": "#591e00",
                        "primary-fixed": "#ffd9dd",
                        "surface-container-low": "#fbf2ed",
                        "on-tertiary-fixed": "#360f00",
                        "on-primary-container": "#ff98a8",
                        "inverse-surface": "#34302c",
                        "on-primary-fixed-variant": "#8a1438",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "section-padding": "80px",
                        "container-max": "1280px",
                        "margin-mobile": "20px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Playfair Display"],
                        "label-md": ["Montserrat"],
                        "headline-xl-mobile": ["Playfair Display"],
                        "headline-xl": ["Playfair Display"],
                        "body-md": ["Montserrat"],
                        "body-lg": ["Montserrat"],
                        "headline-md": ["Playfair Display"]
                    },
                    "fontSize": {
                        "headline-lg": ["48px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "headline-xl-mobile": ["40px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "headline-xl": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                },
            },
        }

</head>

<body>
    <header>
        <nav class="flex justify-between items-center w-full px-gutter max-w-container-max mx-auto h-20">
            <div class="text-headline-md font-headline-md text-primary">Ayam 3D</div>
            <div id="navbar-content" class="hidden md:flex items-center space-x-8">
                <span
                    class="cursor-pointer text-on-surface-variant hover:text-primary transition-colors duration-300 font-label-md text-label-md">Home</span>
                <span
                    class="cursor-pointer text-on-surface-variant hover:text-primary transition-colors duration-300 font-label-md text-label-md">Menu</span>
                <span
                    class="cursor-pointer text-on-surface-variant hover:text-primary transition-colors duration-300 font-label-md text-label-md">About</span>
            </div>
        </nav>
    </header>
    <div id="content" class="pb-10 pb-section-padding px-gutter max-w-container-max mx-auto">
    </div>
    <footer class="bg-surface-container-low border-t border-outline-variant">
        <div
            class="flex flex-col md:flex-row justify-between items-center w-full py-section-padding px-gutter max-w-container-max mx-auto">
            <div class="mb-8 md:mb-0">
                <div class="text-headline-md font-headline-md text-primary">Ayam 3D</div>
                <p class="font-body-md text-body-md text-on-surface-variant mt-2">© 2024 Ayam 3D. All rights reserved.
                </p>
            </div>
            <div class="flex gap-12">
                <div class="flex flex-col gap-4">
                    <span class="font-label-md text-label-md text-secondary uppercase">Navigation</span>
                    <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary underline transition-all"
                        href="#">Contact</a>
                    <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary underline transition-all"
                        href="#">Privacy Policy</a>
                </div>
                <div class="flex flex-col gap-4">
                    <span class="font-label-md text-label-md text-secondary uppercase">Social</span>
                    <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary underline transition-all"
                        href="#">Instagram</a>
                    <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary underline transition-all"
                        href="#">Facebook</a>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
