<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <!-- Google Fonts for Cartoon Style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Start Game Modal -->
    <div id="start-modal" class="modal">
        <form class="modal-content cartoon-box">
            <h2>Welcome to Tic Tac Toe!</h2>
            <div class="input-group">
                <label for="player1">Player 1 (O):</label>
                <input type="text" required id="player1" placeholder="Enter Name">
            </div>
            <div class="input-group">
                <label for="player2">Player 2 (X):</label>
                <input type="text" required id="player2" placeholder="Enter Name">
            </div>
            <button type="submit" id="start-btn" class="cartoon-btn">Start Game</button>
        </form>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content cartoon-box">
            <h2 id="winner-text">Player 1 Wins!</h2>
            <button id="play-again-btn" class="cartoon-btn">Play Again</button>
        </div>
    </div>

    <div class="game-container">
        <h1 class="game-title">Tic Tac Toe</h1>

        <!-- Scoreboard -->
        <div class="scoreboard cartoon-box">
            <div class="score-player">
                <span id="p1-name-display">Player 1</span> (O): <span id="p1-score">0</span>
            </div>
            <div class="vs">VS</div>
            <div class="score-player">
                <span id="p2-name-display">Player 2</span> (X): <span id="p2-score">0</span>
            </div>
        </div>

        <div id="status-display" class="cartoon-box">Game Sedang Berjalan</div>

        <div class="board">
            <div class="cell cartoon-box" onclick="mainCuy(event)" data-index="0"></div>
            <div class="cell cartoon-box" onclick="mainCuy(event)" data-index="1"></div>
            <div class="cell cartoon-box" onclick="mainCuy(event)" data-index="2"></div>
            <div class="cell cartoon-box" onclick="mainCuy(event)" data-index="3"></div>
            <div class="cell cartoon-box" onclick="mainCuy(event)" data-index="4"></div>
            <div class="cell cartoon-box" onclick="mainCuy(event)" data-index="5"></div>
            <div class="cell cartoon-box" onclick="mainCuy(event)" data-index="6"></div>
            <div class="cell cartoon-box" onclick="mainCuy(event)" data-index="7"></div>
            <div class="cell cartoon-box" onclick="mainCuy(event)" data-index="8"></div>
        </div>

        <button id="reset-button" class="cartoon-btn" onclick="resetGame()">Reset Game</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
