<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <div id="status-display">Game Sedang Berjalan</div>
        <div class="board">
            <div class="cell" onclick="mainCuy(event)" data-index="0"></div>
            <div class="cell" onclick="mainCuy(event)" data-index="1"></div>
            <div class="cell" onclick="mainCuy(event)" data-index="2"></div>
            <div class="cell" onclick="mainCuy(event)" data-index="3"></div>
            <div class="cell" onclick="mainCuy(event)" data-index="4"></div>
            <div class="cell" onclick="mainCuy(event)" data-index="5"></div>
            <div class="cell" onclick="mainCuy(event)" data-index="6"></div>
            <div class="cell" onclick="mainCuy(event)" data-index="7"></div>
            <div class="cell" onclick="mainCuy(event)" data-index="8"></div>
        </div>
        <button id="reset-button" onclick="resetGame()">Reset Game</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
